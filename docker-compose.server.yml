version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# SERVER COMPOSE — para cv.joanmata.com
# Uso: docker compose -f docker-compose.server.yml --env-file .env.server up -d --build
# ─────────────────────────────────────────────────────────────────────────────

networks:
  # Red compartida con cv-proxy (reverse proxy). cv-frontend debe ser visible aquí.
  proxy-net:
    external: true
  # Red interna: frontend ↔ backend ↔ db. No visible desde fuera.
  cv-net:
    name: cv-net

services:

  # ── BASE DE DATOS ──────────────────────────────────────────────────────────
  cv-db:
    image: postgres:15-alpine
    container_name: cv-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cv-net          # Solo red interna — NO expuesto al host ni a internet
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BACKEND ───────────────────────────────────────────────────────────────
  cv-backend:
    build: ./backend
    container_name: cv-backend
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@cv-db:5432/${POSTGRES_DB}
    volumes:
      - ./storage:/app/storage
    networks:
      - cv-net          # Solo red interna — NO expuesto al host ni a internet
    depends_on:
      cv-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  # ── FRONTEND ──────────────────────────────────────────────────────────────
  cv-frontend:
    build: ./frontend
    container_name: cv-frontend
    networks:
      - proxy-net       # Visible para cv-proxy
      - cv-net          # Para hablar con cv-backend
    depends_on:
      - cv-backend
    restart: always

volumes:
  postgres_data:
    name: cv-postgres-data
