server {
    listen 80;

    # Docker internal DNS resolver — evita crash si el backend aún no está listo
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    # El container se llama cv-backend en el server compose
    location /api {
        set $backend_host cv-backend;
        proxy_pass http://$backend_host:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # AI models are slow, increase timeouts
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
